# Auto-update Mintlify docs on engine release.
#
# Triggered by `repository_dispatch` event_type=simdrive-release sent from
# `SyncTek-LLC/simdrive` after a successful PyPI publish. Payload:
#   { version, tag, pypi_url, release_url, changelog_section_b64 }
#
# `changelog_section_b64` is the base64-encoded CHANGELOG section for the
# released version, extracted upstream (engine has full checkout access at
# the tag; downstream does NOT -- the engine repo is private). Base64 avoids
# JSON-escape headaches with multiline markdown in `client_payload`.
#
# Action plan:
#   1. Decode `changelog_section_b64` into `.release-tmp/CHANGELOG.md`.
#   2. Run scripts/apply-release.mjs to:
#        - Update `changelog/index.mdx` -- prepend the new release block.
#   3. Commit + push to main. Mintlify auto-deploys on push (~30s build).
#
# Manual fallback: workflow_dispatch with `version` + `tag` inputs runs as
# metadata-only (no changelog entry written) UNLESS the operator pastes a
# base64-encoded section into the optional `changelog_section_b64` input.
# For a full local backfill, prefer running `scripts/apply-release.mjs`
# directly against a local engine checkout.

name: Apply SimDrive release

on:
  repository_dispatch:
    types: [simdrive-release]
  workflow_dispatch:
    inputs:
      version:
        description: "Engine version, e.g. 1.0.0b6"
        required: true
      tag:
        description: "Engine git tag, e.g. simdrive-v1.0.0b6"
        required: true
      changelog_section_b64:
        description: "Base64-encoded CHANGELOG section for this version (optional; if empty, run is metadata-only)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve payload
        id: vars
        env:
          P_VERSION: ${{ github.event.client_payload.version }}
          P_TAG: ${{ github.event.client_payload.tag }}
          P_RELEASE_URL: ${{ github.event.client_payload.release_url }}
          P_PYPI_URL: ${{ github.event.client_payload.pypi_url }}
          P_SECTION_B64: ${{ github.event.client_payload.changelog_section_b64 }}
          I_VERSION: ${{ inputs.version }}
          I_TAG: ${{ inputs.tag }}
          I_SECTION_B64: ${{ inputs.changelog_section_b64 }}
        run: |
          set -euo pipefail
          VER="${P_VERSION:-$I_VERSION}"
          TAG="${P_TAG:-$I_TAG}"
          PYPI_URL="${P_PYPI_URL:-https://pypi.org/project/simdrive/${VER}/}"
          RELEASE_URL="${P_RELEASE_URL:-https://github.com/SyncTek-LLC/simdrive/releases/tag/${TAG}}"
          SECTION_B64="${P_SECTION_B64:-$I_SECTION_B64}"
          echo "version=$VER"             >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"                 >> "$GITHUB_OUTPUT"
          echo "pypi_url=$PYPI_URL"       >> "$GITHUB_OUTPUT"
          echo "release_url=$RELEASE_URL" >> "$GITHUB_OUTPUT"
          if [ -n "$SECTION_B64" ]; then
            echo "has_section=true"  >> "$GITHUB_OUTPUT"
          else
            echo "has_section=false" >> "$GITHUB_OUTPUT"
          fi
          mkdir -p .release-tmp
          printf '%s' "$SECTION_B64" > .release-tmp/section.b64

      - name: Decode CHANGELOG section from payload
        if: steps.vars.outputs.has_section == 'true'
        run: |
          set -euo pipefail
          base64 -d .release-tmp/section.b64 > .release-tmp/CHANGELOG.md
          wc -l .release-tmp/CHANGELOG.md
          head -3 .release-tmp/CHANGELOG.md

      - name: Apply release to docs (full -- prepends changelog section)
        if: steps.vars.outputs.has_section == 'true'
        env:
          SIMDRIVE_VERSION: ${{ steps.vars.outputs.version }}
          SIMDRIVE_TAG: ${{ steps.vars.outputs.tag }}
          SIMDRIVE_PYPI_URL: ${{ steps.vars.outputs.pypi_url }}
          SIMDRIVE_RELEASE_URL: ${{ steps.vars.outputs.release_url }}
          SIMDRIVE_CHANGELOG_PATH: .release-tmp/CHANGELOG.md
        run: node scripts/apply-release.mjs

      - name: Metadata-only run (no section provided)
        if: steps.vars.outputs.has_section != 'true'
        run: |
          set -euo pipefail
          echo "::warning::metadata-only run -- changelog/index.mdx NOT updated for ${{ steps.vars.outputs.version }} (no changelog_section_b64 provided). Re-run with the b64 input or do a local backfill."

      - name: Commit + push (Mintlify picks it up on push to main)
        run: |
          set -euo pipefail
          git config user.name  "synctek-release-bot"
          git config user.email "release-bot@synctek.io"
          if git diff --quiet && git diff --cached --quiet; then
            echo "No docs changes for ${{ steps.vars.outputs.version }} -- nothing to commit."
            exit 0
          fi
          git add -A
          git commit -m "docs(release): bump docs to ${{ steps.vars.outputs.version }} [INIT-2026-551]"
          git push origin main
